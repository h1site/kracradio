name: Weekly Music News

on:
  schedule:
    - cron: '0 12 * * 1'   # 08:00 America/Toronto = 12:00 UTC (heure d’été/estime approx)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm ci

      - name: Run generator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWS_MAX_ITEMS: '12'
        run: node scripts/generate-weekly-music-news.mjs
